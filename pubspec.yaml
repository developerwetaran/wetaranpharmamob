name: wetaran_pharma
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.0
  image_picker: ^1.2.2
  file_picker: ^8.0.7
  flutter_native_splash: ^2.4.0
  provider: ^6.1.4
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  geolocator: ^13.0.3
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/wetaran_pharma_logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/wetaran_pharma_logo.png
    icon_background_color: "#FFFFFF"
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/wetaran_pharma_logo.png"

  adaptive_icon_foreground: "assets/icon/wetaran_pharma_logo.png"
  adaptive_icon_background: "#FFFFFF"

  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
